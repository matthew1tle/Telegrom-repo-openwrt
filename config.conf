# OpenWrt Telegram Bot Panel Configuration File
# Path: /etc/owrt-tg-bot/config.conf

[telegram]
# Your Telegram Bot Token obtained from @BotFather
bot_token=""

# Allowed Telegram User IDs separated by commas (e.g., 12345678,987654321)
# Only these IDs can access and control the bot
allowed_chat_ids=""

# Long polling timeout in seconds
long_polling_timeout=5

[system]
# Default language file to load from lang/ directory (e.g., en, ru)
language="en"

# Log level: 0=EMERG, 1=ALERT, 2=CRIT, 3=ERR, 4=WARN, 5=NOTICE, 6=INFO, 7=DEBUG
log_level=6

# Paths configuration
base_dir="/usr/share/owrt-tg-bot"
log_file="/var/log/owrt-tg-bot.log"
state_dir="/var/run/owrt-tg-bot"

[monitors]
# Thresholds for automated alerting
alert_temp_threshold=75
alert_ram_threshold=90
alert_notify_new_client=1